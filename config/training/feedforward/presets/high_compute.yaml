paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/feedforward_network

experiment:
  run_name: te_feedforward_high_compute
  model_family: feedforward
  model_type: feedforward

dataset:
  curve_batch_size: 6
  point_stride: 5
  maximum_points_per_curve: null
  num_workers: 8
  pin_memory: true

model:
  input_size: 5
  output_size: 1
  hidden_size:
    - 256
    - 256
    - 128
    - 64
  activation_name: GELU
  dropout_probability: 0.10
  use_layer_norm: true

training:
  learning_rate: 0.0007
  weight_decay: 0.0001
  min_epochs: 20
  max_epochs: 250
  patience: 35
  min_delta: 1.0e-5
  log_every_n_steps: 1
  fast_dev_run: false
  deterministic: false

runtime:
  accelerator: auto
  devices: auto
  precision: "32"
  benchmark: true
  use_non_blocking_transfer: true
