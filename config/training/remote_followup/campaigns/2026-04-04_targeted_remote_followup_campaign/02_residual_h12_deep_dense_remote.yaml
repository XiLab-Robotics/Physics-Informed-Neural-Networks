paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/training_runs/residual_harmonic_mlp

experiment:
  run_name: te_residual_h12_deep_dense_remote
  model_family: residual_harmonic_mlp
  model_type: residual_harmonic_mlp

metadata:
  campaign_name: targeted_remote_followup_campaign_2026_04_04_11_21_09
  planning_report_path: doc/reports/campaign_plans/infrastructure/2026-04-04-11-21-09_targeted_remote_followup_campaign_plan_report.md
  phase_name: remote_residual_followup
  campaign_config_id: residual_h12_deep_dense_remote
  notes: Denser angular-sampling remote follow-up of the deeper residual-harmonic joint branch.
  random_seed: 42

dataset:
  curve_batch_size: 4
  point_stride: 3
  maximum_points_per_curve: null
  num_workers: 8
  pin_memory: true

model:
  input_size: 5
  output_size: 1
  harmonic_order: 12
  coefficient_mode: static
  residual_hidden_size:
    - 128
    - 128
    - 64
  residual_activation_name: GELU
  residual_dropout_probability: 0.10
  residual_use_layer_norm: true
  freeze_structured_branch: false

training:
  learning_rate: 0.0007
  weight_decay: 0.0001
  min_epochs: 20
  max_epochs: 250
  patience: 35
  min_delta: 1.0e-5
  log_every_n_steps: 1
  fast_dev_run: false
  deterministic: false

runtime:
  accelerator: auto
  devices: auto
  precision: "32"
  benchmark: true
  use_non_blocking_transfer: true
