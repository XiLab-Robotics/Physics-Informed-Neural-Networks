paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/training_runs/tree

experiment:
  run_name: te_hist_gbr_remote_refined
  model_family: tree
  model_type: hist_gradient_boosting

metadata:
  campaign_name: targeted_remote_followup_campaign_2026_04_04_11_21_09
  planning_report_path: doc/reports/campaign_plans/2026-04-04-11-21-09_targeted_remote_followup_campaign_plan_report.md
  phase_name: remote_tree_followup
  campaign_config_id: hist_gbr_remote_refined
  notes: Bounded remote refinement around the current histogram-gradient-boosting tree leader.
  random_seed: 42

dataset:
  curve_batch_size: 4
  point_stride: 5
  maximum_points_per_curve: null
  num_workers: 8
  pin_memory: false

model:
  input_size: 5
  output_size: 1
  learning_rate: 0.025
  max_iter: 1000
  max_depth: 10
  min_samples_leaf: 8
  max_bins: 255

training:
  deterministic: true

runtime:
  accelerator: cpu
  devices: 1
  precision: "32"
  benchmark: false
  use_non_blocking_transfer: false
