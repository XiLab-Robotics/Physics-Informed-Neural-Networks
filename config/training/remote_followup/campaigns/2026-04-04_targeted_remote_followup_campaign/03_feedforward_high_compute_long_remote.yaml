paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/training_runs/feedforward

experiment:
  run_name: te_feedforward_high_compute_long_remote
  model_family: feedforward
  model_type: feedforward

metadata:
  campaign_name: targeted_remote_followup_campaign_2026_04_04_11_21_09
  planning_report_path: doc/reports/campaign_plans/infrastructure/2026-04-04-11-21-09_targeted_remote_followup_campaign_plan_report.md
  phase_name: remote_feedforward_followup
  campaign_config_id: feedforward_high_compute_long_remote
  notes: Longer-budget remote follow-up of the current feedforward family best.
  random_seed: 42

dataset:
  curve_batch_size: 6
  point_stride: 5
  maximum_points_per_curve: null
  num_workers: 8
  pin_memory: true

model:
  input_size: 5
  output_size: 1
  hidden_size:
    - 256
    - 256
    - 128
    - 64
  activation_name: GELU
  dropout_probability: 0.10
  use_layer_norm: true

training:
  learning_rate: 0.0007
  weight_decay: 0.0001
  min_epochs: 20
  max_epochs: 320
  patience: 45
  min_delta: 1.0e-5
  log_every_n_steps: 1
  fast_dev_run: false
  deterministic: false

runtime:
  accelerator: auto
  devices: auto
  precision: "32"
  benchmark: true
  use_non_blocking_transfer: true
