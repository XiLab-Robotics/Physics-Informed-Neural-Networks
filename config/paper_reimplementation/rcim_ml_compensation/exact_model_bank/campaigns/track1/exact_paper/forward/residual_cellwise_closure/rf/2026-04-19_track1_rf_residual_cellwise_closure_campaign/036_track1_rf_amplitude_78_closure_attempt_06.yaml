paths:
  source_dataframe_path: reference/rcim_ml_compensation_recovered_assets/code/latest_snapshot/dataFrame_prediction_Fw_v14_newFreq.csv
  exact_onnx_reference_root: reference/rcim_ml_compensation_recovered_assets/models/exact_onnx_paper_release
  output_root: output/validation_checks/paper_reimplementation_rcim_exact_model_bank
experiment:
  run_name: track1_rf_amplitude_78_closure_attempt_06
  model_family: paper_reimplementation_rcim_exact_model_bank
  model_type: exact_paper_family_bank
data:
  input_feature_names:
    - rpm
    - deg
    - tor
  maximum_deg: 35.0
  csv_separator: ";"
  csv_decimal: ","
training:
  enabled_families:
    - RF
  test_size: 0.25
  random_seed: 0
  deterministic: true
  threadpool_limit: 1
  hyperparameter_search:
    mode: paper_reference_grid_search
    grid_search_n_jobs: 24
    grid_search_verbose: 2
    grid_search_pre_dispatch: 24
target_scope:
  mode: amplitudes_only
  include_phase_zero: false
  harmonic_order_filter:
    - 78
export:
  enable_onnx_export: true
  target_opset: 12
  export_failure_mode: continue
  enable_empty_svr_constant_surrogate: true
