paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/validation_checks/paper_reimplementation_rcim_harmonic_wise

experiment:
  run_name: track1_rf_h013981_bridge_control
  model_family: paper_reimplementation_rcim_harmonic_wise
  model_type: harmonic_wise_random_forest_track1_h013981_bridge_control

evaluation:
  selected_harmonics: [0, 1, 3, 39, 40, 78, 81, 156, 162, 240]
  decomposition_point_stride: 20
  playback_angle_probe_count: 720
  playback_step_count: 180
  playback_direction_label: forward
  percentage_error_denominator: mean_abs_truth

features:
  engineered_terms: []

model:
  estimator_type: random_forest
  n_estimators: 1000
  max_depth: 34
  min_samples_leaf: 1
  n_jobs: -1
  random_seed: 42
  threadpool_limit: 1
  harmonic_overrides:
    "0": { n_estimators: 1150, max_depth: 36, min_samples_leaf: 1 }
    "1": { n_estimators: 1150, max_depth: 36, min_samples_leaf: 1 }
    "3": { n_estimators: 1125, max_depth: 36, min_samples_leaf: 1 }
    "39": { n_estimators: 1100, max_depth: 34, min_samples_leaf: 1 }
    "81": { n_estimators: 1150, max_depth: 36, min_samples_leaf: 1 }

playback_profiles:
  robot: { max_speed_rpm: 303.0, max_torque_nm: 759.0, oil_temperature_deg: 31.6 }
  cycloidal: { max_speed_rpm: 500.0, max_torque_nm: 370.0, oil_temperature_deg: 26.7 }

