paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  exact_onnx_reference_root: ''
  output_root: output/validation_checks/paper_reimplementation_rcim_original_dataset_exact_model_bank_forward_last_non_green_cells
experiment:
  run_name: track1_forward_gbm_ampl_h162_last_non_green_cells_attempt_20
  model_family: paper_reimplementation_rcim_original_dataset_exact_model_bank_forward_last_non_green_cells
  model_type: exact_model_bank_forward_last_non_green_cells_gbm_ampl_h162
data:
  direction_label: forward
  input_feature_names:
  - rpm
  - deg
  - tor
evaluation:
  selected_harmonics:
  - 0
  - 1
  - 3
  - 39
  - 40
  - 78
  - 81
  - 156
  - 162
  - 240
  decomposition_point_stride: 1
target_scope:
  mode: amplitudes_only
  include_phase_zero: false
  harmonic_order_filter:
  - 162
training:
  enabled_families:
  - GBM
  validation_split: 0.12
  test_size: 0.18
  random_seed: 89
  deterministic: true
  threadpool_limit: 1
  joblib_cpu_limit: 0
  grid_search_disabled_families: []
  hyperparameter_search:
    mode: paper_reference_grid_search
    grid_search_n_jobs: -1
    grid_search_verbose: 2
    grid_search_pre_dispatch: 2*n_jobs
export:
  enable_onnx_export: true
  target_opset: 12
  export_failure_mode: continue
  enable_empty_svr_constant_surrogate: true
