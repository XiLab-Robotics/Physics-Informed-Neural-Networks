<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Regression TE Architecture Diagram</title>
  <desc id="desc">Architecture-style computational graph of the harmonic regression transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Harmonic Computational Structure</text>
  <text x="64" y="98" class="canvas-subtitle">Basis generation, coefficient resolution, term-wise multiplication, and final summation</text>
  <g transform="translate(0,10.0)">
  <rect x="54" y="242" width="180" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M72, 242 H216 Q234, 242 234, 260 V288 H54 V260 Q54, 242 72, 242 Z" fill="url(#card_header)"/>
  <line x1="54" y1="288" x2="234" y2="288" stroke="#ADD5F7" stroke-width="2"/>
  <text x="144" y="273" text-anchor="middle" class="card-title">Angle Input</text>
  <text x="144.0" y="331.0" text-anchor="middle" class="card-text">Theta</text>
  <rect x="274" y="140" width="234" height="328" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M292, 140 H490 Q508, 140 508, 158 V186 H274 V158 Q274, 140 292, 140 Z" fill="url(#card_header)"/>
  <line x1="274" y1="186" x2="508" y2="186" stroke="#7FB2F0" stroke-width="2"/>
  <text x="391" y="171" text-anchor="middle" class="card-title">Basis Features</text>
  <text x="391.0" y="266.0" text-anchor="middle" class="card-text">Constant term</text>
  <text x="391.0" y="286.0" text-anchor="middle" class="card-text">sin(theta)</text>
  <text x="391.0" y="306.0" text-anchor="middle" class="card-text">cos(theta)</text>
  <text x="391.0" y="326.0" text-anchor="middle" class="card-text">sin(2 theta)</text>
  <text x="391.0" y="346.0" text-anchor="middle" class="card-text">cos(2 theta)</text>
  <text x="391.0" y="366.0" text-anchor="middle" class="card-text">... up to order K</text>
  <text x="391.0" y="398.0" text-anchor="middle" class="card-note">Structured periodic basis</text>
  <rect x="552" y="140" width="234" height="328" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M570, 140 H768 Q786, 140 786, 158 V186 H552 V158 Q552, 140 570, 140 Z" fill="url(#card_header)"/>
  <line x1="552" y1="186" x2="786" y2="186" stroke="#ADD5F7" stroke-width="2"/>
  <text x="669" y="171" text-anchor="middle" class="card-title">Coefficient Vector</text>
  <text x="669.0" y="267.0" text-anchor="middle" class="card-text">c0</text>
  <text x="669.0" y="287.0" text-anchor="middle" class="card-text">a1 and b1</text>
  <text x="669.0" y="307.0" text-anchor="middle" class="card-text">a2 and b2</text>
  <text x="669.0" y="327.0" text-anchor="middle" class="card-text">Higher-order pairs</text>
  <text x="669.0" y="347.0" text-anchor="middle" class="card-text">Optional conditioned shift</text>
  <text x="669.0" y="379.0" text-anchor="middle" class="card-note">Static or operating-state</text>
  <text x="669.0" y="397.0" text-anchor="middle" class="card-note">conditioned</text>
  <rect x="836" y="242" width="168" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M854, 242 H986 Q1004, 242 1004, 260 V288 H836 V260 Q836, 242 854, 242 Z" fill="url(#card_header)"/>
  <line x1="836" y1="288" x2="1004" y2="288" stroke="#ADD5F7" stroke-width="2"/>
  <text x="920" y="273" text-anchor="middle" class="card-title">Multiply</text>
  <text x="920.0" y="321.0" text-anchor="middle" class="card-text">Term-wise</text>
  <text x="920.0" y="341.0" text-anchor="middle" class="card-text">product</text>
  <rect x="1052" y="242" width="156" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M1070, 242 H1190 Q1208, 242 1208, 260 V288 H1052 V260 Q1052, 242 1070, 242 Z" fill="url(#card_header)"/>
  <line x1="1052" y1="288" x2="1208" y2="288" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1130" y="273" text-anchor="middle" class="card-title">Sum</text>
  <text x="1130.0" y="321.0" text-anchor="middle" class="card-text">Transmission</text>
  <text x="1130.0" y="341.0" text-anchor="middle" class="card-text">error</text>
  <path d="M242.0,304.0 L252.0,304.0 L252.0,304.0 L262.0,304.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M516.0,304.0 L528.0,304.0 L528.0,304.0 L540.0,304.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M794.0,304.0 L809.0,304.0 L809.0,304.0 L824.0,304.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M1012.0,304.0 L1026.0,304.0 L1026.0,304.0 L1040.0,304.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="519" y="512" width="300" height="160" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M537, 512 H801 Q819, 512 819, 530 V558 H519 V530 Q519, 512 537, 512 Z" fill="url(#card_header)"/>
  <line x1="519" y1="558" x2="819" y2="558" stroke="#ADD5F7" stroke-width="2"/>
  <text x="669.0" y="543" text-anchor="middle" class="card-title">Conditioning Path</text>
  <rect x="543" y="584.0" width="252" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="669.0" y="598.0" text-anchor="middle" class="flow-row-text">Speed, torque, temp, dir</text>
  <line x1="669.0" y1="607.0" x2="669.0" y2="621.0" stroke="#4E7AC7" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="543" y="628.0" width="252" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="669.0" y="642.0" text-anchor="middle" class="flow-row-text">Linear shift in coefficient space</text>
  <line x1="669.0" y1="504.0" x2="669.0" y2="480.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  </g>

</svg>
