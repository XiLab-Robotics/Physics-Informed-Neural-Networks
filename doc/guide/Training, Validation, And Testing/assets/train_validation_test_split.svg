<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#183b56">Why The Dataset Is Split</text>
  <text x="60" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#486581">Training updates parameters, validation guides development, testing evaluates the final frozen design.</text>
  <rect x="70" y="180" width="1060" height="120" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="110" y="215" width="500" height="50" rx="16" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="630" y="215" width="230" height="50" rx="16" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
  <rect x="880" y="215" width="180" height="50" rx="16" fill="#fecaca" stroke="#ef4444" stroke-width="2"/>
  <text x="360" y="247" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">Training Set</text>
  <text x="745" y="247" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">Validation Set</text>
  <text x="970" y="247" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">Test Set</text>
  <rect x="90" y="380" width="280" height="220" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <rect x="460" y="380" width="280" height="220" rx="24" fill="#f7fee7" stroke="#84cc16" stroke-width="2"/>
  <rect x="830" y="380" width="280" height="220" rx="24" fill="#fef2f2" stroke="#f87171" stroke-width="2"/>
  <text x="230" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Training</text>
  <text x="600" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#3f6212">Validation</text>
  <text x="970" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#991b1b">Testing</text>
  <text x="230" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Used for optimizer updates</text>
  <text x="230" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Shapes the model parameters</text>
  <text x="600" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Used for checkpoint selection</text>
  <text x="600" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Shapes the design decisions</text>
  <text x="970" y="475" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Used after choices are frozen</text>
  <text x="970" y="510" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Estimates final generalization</text>
  <line x1="360" y1="265" x2="230" y2="380" stroke="#3b82f6" stroke-width="4"/>
  <line x1="745" y1="265" x2="600" y2="380" stroke="#84cc16" stroke-width="4"/>
  <line x1="970" y1="265" x2="970" y2="380" stroke="#ef4444" stroke-width="4"/>
</svg>
