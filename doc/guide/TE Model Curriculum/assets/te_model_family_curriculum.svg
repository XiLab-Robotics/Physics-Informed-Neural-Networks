<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860">
  <rect width="1280" height="860" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#183b56">TE Model Family Curriculum</text>
  <text x="60" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#486581">Progress from generic regression toward increasingly structured, temporal, hybrid, and physics-informed modeling.</text>

  <rect x="70" y="170" width="230" height="120" rx="22" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="370" y="170" width="230" height="120" rx="22" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <rect x="670" y="170" width="230" height="120" rx="22" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <rect x="970" y="170" width="230" height="120" rx="22" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>

  <text x="185" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">Generic</text>
  <text x="185" y="255" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Feedforward MLP</text>

  <text x="485" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#166534">Structured</text>
  <text x="485" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#1f2937">Harmonic /</text>
  <text x="485" y="272" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#1f2937">Periodic</text>

  <text x="785" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#92400e">Temporal</text>
  <text x="785" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#1f2937">GRU / LSTM /</text>
  <text x="785" y="272" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#1f2937">TCN</text>

  <text x="1085" y="220" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#991b1b">Physics-</text>
  <text x="1085" y="248" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#991b1b">Informed</text>
  <text x="1085" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#1f2937">PINN</text>

  <line x1="300" y1="230" x2="370" y2="230" stroke="#64748b" stroke-width="4"/>
  <polygon points="370,230 354,222 354,238" fill="#64748b"/>
  <line x1="600" y1="230" x2="670" y2="230" stroke="#64748b" stroke-width="4"/>
  <polygon points="670,230 654,222 654,238" fill="#64748b"/>
  <line x1="900" y1="230" x2="970" y2="230" stroke="#64748b" stroke-width="4"/>
  <polygon points="970,230 954,222 954,238" fill="#64748b"/>

  <rect x="120" y="382" width="180" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="120" y="492" width="180" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="380" y="342" width="210" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="380" y="452" width="210" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="380" y="562" width="210" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="670" y="342" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="670" y="452" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="670" y="562" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="960" y="342" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="960" y="452" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <rect x="960" y="562" width="230" height="90" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>

  <text x="210" y="436" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">Feedforward</text>
  <text x="210" y="535" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">Tree</text>
  <text x="210" y="563" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1f2937">Benchmarks</text>

  <text x="485" y="389" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Harmonic</text>
  <text x="485" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Regression</text>
  <text x="485" y="499" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Periodic Feature</text>
  <text x="485" y="527" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Network</text>
  <text x="485" y="609" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Residual Harmonic</text>
  <text x="485" y="637" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Network</text>

  <text x="785" y="389" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Lagged Feature</text>
  <text x="785" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">MLP</text>
  <text x="785" y="499" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">GRU, LSTM,</text>
  <text x="785" y="527" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">and TCN</text>
  <text x="785" y="609" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Transformer /</text>
  <text x="785" y="637" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">State Space</text>

  <text x="1075" y="389" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Mixture Of</text>
  <text x="1075" y="417" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Experts</text>
  <text x="1075" y="499" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Fourier /</text>
  <text x="1075" y="527" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Harmonic Head</text>
  <text x="1075" y="609" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">Smoothness /</text>
  <text x="1075" y="637" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1f2937">SIREN / PINN</text>

  <text x="120" y="760" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Read the sequence as a staircase of stronger inductive bias, not as a race toward maximum complexity.</text>
</svg>
