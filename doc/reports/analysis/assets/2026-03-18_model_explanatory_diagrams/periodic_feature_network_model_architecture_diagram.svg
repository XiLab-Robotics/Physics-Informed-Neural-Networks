  <circle cx="970" cy="299" r="15" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="970" y="303" text-anchor="middle" class="node-label">h2</text>
  <circle cx="970" cy="365" r="15" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="970" y="369" text-anchor="middle" class="node-label">h3</text>
  <circle cx="970" cy="431" r="15" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
