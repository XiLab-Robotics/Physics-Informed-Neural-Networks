  <text x="381" y="266.0" text-anchor="middle" class="card-text">sin(theta)</text>
  <text x="381" y="286.0" text-anchor="middle" class="card-text">cos(theta)</text>
  <text x="381" y="306.0" text-anchor="middle" class="card-text">sin(2 theta)</text>
  <text x="381" y="326.0" text-anchor="middle" class="card-text">cos(2 theta)</text>
