  <text x="134" y="343.0" text-anchor="middle" class="card-text">Theta</text>
  <rect x="258" y="138" width="246" height="328" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M276, 138 H486 Q504, 138 504, 156 V184 H258 V156 Q258, 138 276, 138 Z" fill="url(#card_header)"/>
  <line x1="258" y1="184" x2="504" y2="184" stroke="#7FB2F0" stroke-width="2"/>
