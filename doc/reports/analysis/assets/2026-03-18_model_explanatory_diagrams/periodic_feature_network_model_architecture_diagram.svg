  <line x1="1033.4" y1="371.7" x2="1115.2" y2="395.7" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1033.4" y1="424.3" x2="1116.6" y2="259.3" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1035.0" y1="431.0" x2="1116.6" y2="325.3" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1033.4" y1="437.7" x2="1116.6" y2="391.3" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1145.0" y1="266.0" x2="1216.6" y2="338.7" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1145.0" y1="332.0" x2="1215.0" y2="332.0" stroke="#C8DCF8" stroke-width="1.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
