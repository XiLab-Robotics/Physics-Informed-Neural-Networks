  <text x="380.0" y="279.0" text-anchor="middle" class="card-text">cos(theta)</text>
  <text x="380.0" y="299.0" text-anchor="middle" class="card-text">sin(2 theta)</text>
  <text x="380.0" y="319.0" text-anchor="middle" class="card-text">cos(2 theta)</text>
