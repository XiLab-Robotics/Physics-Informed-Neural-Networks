  <line x1="983.4" y1="371.7" x2="1051.2" y2="395.7" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="983.4" y1="424.3" x2="1052.6" y2="259.3" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="985.0" y1="431.0" x2="1052.6" y2="325.3" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="983.4" y1="437.7" x2="1052.6" y2="391.3" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1081.0" y1="266.0" x2="1132.6" y2="338.7" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1081.0" y1="332.0" x2="1131.0" y2="332.0" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1081.0" y1="398.0" x2="1132.6" y2="325.3" stroke="#C8DCF8" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="210.0" y1="332.0" x2="232.0" y2="332.0" stroke="#4E7AC7" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M480.0,430.0 L700.0,430.0 L700.0,350.0 L716.0,350.0 L730.0,350.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
