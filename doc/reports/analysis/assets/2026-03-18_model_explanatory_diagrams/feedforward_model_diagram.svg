<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Feedforward TE Model Diagram</title>
  <desc id="desc">Conceptual flow diagram of the feedforward transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="11" markerHeight="11" refX="9.4" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Feedforward TE Baseline</text>
  <text x="64" y="98" class="canvas-subtitle">Generic point-wise nonlinear regressor without explicit periodic decomposition</text>
  <g transform="translate(0,52.0)">
  <rect x="74" y="182" width="214" height="196" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M92, 182 H270 Q288, 182 288, 200 V228 H74 V200 Q74, 182 92, 182 Z" fill="url(#card_header)"/>
  <line x1="74" y1="228" x2="288" y2="228" stroke="#ADD5F7" stroke-width="2"/>
  <text x="181" y="213" text-anchor="middle" class="card-title">Input Point</text>
  <text x="98.0" y="261.0" text-anchor="start" class="card-text">Angle sample</text>
  <text x="98.0" y="281.0" text-anchor="start" class="card-text">Speed and torque</text>
  <text x="98.0" y="301.0" text-anchor="start" class="card-text">Temperature</text>
  <text x="98.0" y="321.0" text-anchor="start" class="card-text">Direction</text>
  <text x="98.0" y="353.0" text-anchor="start" class="card-note">Five operating features</text>
  <rect x="346" y="182" width="214" height="196" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M364, 182 H542 Q560, 182 560, 200 V228 H346 V200 Q346, 182 364, 182 Z" fill="url(#card_header)"/>
  <line x1="346" y1="228" x2="560" y2="228" stroke="#ADD5F7" stroke-width="2"/>
  <text x="453" y="213" text-anchor="middle" class="card-title">Normalization</text>
  <text x="370.0" y="271.0" text-anchor="start" class="card-text">Input scaling</text>
  <text x="370.0" y="291.0" text-anchor="start" class="card-text">Target scaling</text>
  <text x="370.0" y="311.0" text-anchor="start" class="card-text">Train-set mean and std</text>
  <text x="370.0" y="343.0" text-anchor="start" class="card-note">Shared preprocessing</text>
  <rect x="618" y="164" width="304" height="232" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M636, 164 H904 Q922, 164 922, 182 V210 H618 V182 Q618, 164 636, 164 Z" fill="url(#card_header)"/>
  <line x1="618" y1="210" x2="922" y2="210" stroke="#7FB2F0" stroke-width="2"/>
  <text x="770.0" y="195" text-anchor="middle" class="card-title">Feedforward Network</text>
  <rect x="642" y="234.0" width="256" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="770.0" y="248.0" text-anchor="middle" class="flow-row-text">Linear block</text>
  <line x1="770.0" y1="255.0" x2="770.0" y2="259.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="642" y="264.0" width="256" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="770.0" y="278.0" text-anchor="middle" class="flow-row-text">Optional layer norm</text>
  <line x1="770.0" y1="285.0" x2="770.0" y2="289.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="642" y="294.0" width="256" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="770.0" y="308.0" text-anchor="middle" class="flow-row-text">Activation and dropout</text>
  <line x1="770.0" y1="315.0" x2="770.0" y2="319.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="642" y="324.0" width="256" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="770.0" y="338.0" text-anchor="middle" class="flow-row-text">Scalar output head</text>
  <text x="770.0" y="378.0" text-anchor="middle" class="card-note">Learns TE structure implicitly</text>
  <rect x="980" y="182" width="226" height="196" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M998, 182 H1188 Q1206, 182 1206, 200 V228 H980 V200 Q980, 182 998, 182 Z" fill="url(#card_header)"/>
  <line x1="980" y1="228" x2="1206" y2="228" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1093" y="213" text-anchor="middle" class="card-title">Prediction</text>
  <text x="1004.0" y="271.0" text-anchor="start" class="card-text">Normalized TE</text>
  <text x="1004.0" y="291.0" text-anchor="start" class="card-text">Denormalized scalar TE</text>
  <text x="1004.0" y="311.0" text-anchor="start" class="card-text">MAE and RMSE logging</text>
  <text x="1004.0" y="343.0" text-anchor="start" class="card-note">Single-point inference</text>
  <line x1="288.0" y1="280.0" x2="346.0" y2="280.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="560.0" y1="280.0" x2="618.0" y2="280.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="922.0" y1="280.0" x2="980.0" y2="280.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="112" y="458" width="1056" height="106" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M130, 458 H1150 Q1168, 458 1168, 476 V504 H112 V476 Q112, 458 130, 458 Z" fill="url(#card_header)"/>
  <line x1="112" y1="504" x2="1168" y2="504" stroke="#ADD5F7" stroke-width="2"/>
  <text x="640" y="489" text-anchor="middle" class="card-title">Reading Key</text>
  <text x="640.0" y="538.0" text-anchor="middle" class="card-text">Best used as a neutral nonlinear baseline before adding explicit periodic or physics-aware structure.</text>
  </g>

</svg>
