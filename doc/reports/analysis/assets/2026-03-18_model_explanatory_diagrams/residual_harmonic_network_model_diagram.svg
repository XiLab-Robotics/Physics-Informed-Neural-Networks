<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Residual Harmonic Network TE Model Diagram</title>
  <desc id="desc">Conceptual flow diagram of the residual harmonic network transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="11" markerHeight="11" refX="9.4" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Residual Harmonic Network</text>
  <text x="64" y="98" class="canvas-subtitle">Structured harmonic branch plus neural residual correction</text>
  <g transform="translate(0,-12.0)">
  <rect x="60" y="242" width="220" height="170" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M78, 242 H262 Q280, 242 280, 260 V288 H60 V260 Q60, 242 78, 242 Z" fill="url(#card_header)"/>
  <line x1="60" y1="288" x2="280" y2="288" stroke="#ADD5F7" stroke-width="2"/>
  <text x="170" y="273" text-anchor="middle" class="card-title">Shared Input</text>
  <text x="84.0" y="318.0" text-anchor="start" class="card-text">Angle sample</text>
  <text x="84.0" y="338.0" text-anchor="start" class="card-text">Normalized operating state</text>
  <text x="84.0" y="358.0" text-anchor="start" class="card-text">Common input to both branches</text>
  <text x="84.0" y="390.0" text-anchor="start" class="card-note">One point feeds both paths</text>
  <rect x="352" y="162" width="264" height="196" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M370, 162 H598 Q616, 162 616, 180 V208 H352 V180 Q352, 162 370, 162 Z" fill="url(#card_header)"/>
  <line x1="352" y1="208" x2="616" y2="208" stroke="#7FB2F0" stroke-width="2"/>
  <text x="484.0" y="193" text-anchor="middle" class="card-title">Structured Branch</text>
  <rect x="376" y="229.0" width="216" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="484.0" y="243.0" text-anchor="middle" class="flow-row-text">Harmonic basis</text>
  <line x1="484.0" y1="250.0" x2="484.0" y2="254.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="376" y="259.0" width="216" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="484.0" y="273.0" text-anchor="middle" class="flow-row-text">Coefficient resolution</text>
  <line x1="484.0" y1="280.0" x2="484.0" y2="284.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="376" y="289.0" width="216" height="18" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="484.0" y="303.0" text-anchor="middle" class="flow-row-text">Structured TE prediction</text>
  <text x="484.0" y="343.0" text-anchor="middle" class="card-note">Can be frozen or joint-trained</text>
  <rect x="352" y="404" width="264" height="168" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M370, 404 H598 Q616, 404 616, 422 V450 H352 V422 Q352, 404 370, 404 Z" fill="url(#card_header)"/>
  <line x1="352" y1="450" x2="616" y2="450" stroke="#ADD5F7" stroke-width="2"/>
  <text x="484.0" y="435" text-anchor="middle" class="card-title">Residual Branch</text>
  <rect x="376" y="472.0" width="216" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="484.0" y="486.0" text-anchor="middle" class="flow-row-text">Dense residual MLP</text>
  <line x1="484.0" y1="493.0" x2="484.0" y2="497.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="376" y="502.0" width="216" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="484.0" y="516.0" text-anchor="middle" class="flow-row-text">Learns remaining error</text>
  <text x="484.0" y="556.0" text-anchor="middle" class="card-note">Only models the remaining error</text>
  <rect x="716" y="266" width="150" height="104" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M734, 266 H848 Q866, 266 866, 284 V312 H716 V284 Q716, 266 734, 266 Z" fill="url(#card_header)"/>
  <line x1="716" y1="312" x2="866" y2="312" stroke="#ADD5F7" stroke-width="2"/>
  <text x="791" y="297" text-anchor="middle" class="card-title">Add</text>
  <text x="791.0" y="345.0" text-anchor="middle" class="card-text">H plus R</text>
  <rect x="952" y="190" width="222" height="252" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M970, 190 H1156 Q1174, 190 1174, 208 V236 H952 V208 Q952, 190 970, 190 Z" fill="url(#card_header)"/>
  <line x1="952" y1="236" x2="1174" y2="236" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1063" y="221" text-anchor="middle" class="card-title">Outputs</text>
  <text x="976.0" y="297.0" text-anchor="start" class="card-text">Structured prediction</text>
  <text x="976.0" y="317.0" text-anchor="start" class="card-text">Residual prediction</text>
  <text x="976.0" y="337.0" text-anchor="start" class="card-text">Total prediction</text>
  <text x="976.0" y="357.0" text-anchor="start" class="card-text">Structured diagnostics</text>
  <text x="976.0" y="389.0" text-anchor="start" class="card-note">Useful for branch-level analysis</text>
  <path d="M280.0,296.0 L316.0,296.0 L316.0,260.0 L352.0,260.0" fill="none" stroke="#4E7AC7" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M280.0,350.0 L316.0,350.0 L316.0,488.0 L352.0,488.0" fill="none" stroke="#4E7AC7" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="616.0" y1="260.0" x2="716.0" y2="298.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="616.0" y1="488.0" x2="716.0" y2="338.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="866.0" y1="318.0" x2="952.0" y2="318.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="112" y="588" width="1012" height="106" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M130, 588 H1106 Q1124, 588 1124, 606 V634 H112 V606 Q112, 588 130, 588 Z" fill="url(#card_header)"/>
  <line x1="112" y1="634" x2="1124" y2="634" stroke="#ADD5F7" stroke-width="2"/>
  <text x="618" y="619" text-anchor="middle" class="card-title">Interpretation</text>
  <text x="618.0" y="668.0" text-anchor="middle" class="card-text">The network keeps the interpretable periodic backbone and learns only the unexplained residual component.</text>
  </g>

</svg>
