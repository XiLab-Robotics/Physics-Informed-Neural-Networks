<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Regression TE Model Diagram</title>
  <desc id="desc">Conceptual flow diagram of the harmonic regression transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Harmonic Regression</text>
  <text x="64" y="98" class="canvas-subtitle">Explicit periodic model with a truncated harmonic series</text>
  <g transform="translate(0,53.0)">
  <rect x="64" y="186" width="220" height="194" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M82, 186 H266 Q284, 186 284, 204 V232 H64 V204 Q64, 186 82, 186 Z" fill="url(#card_header)"/>
  <line x1="64" y1="232" x2="284" y2="232" stroke="#ADD5F7" stroke-width="2"/>
  <text x="174" y="217" text-anchor="middle" class="card-title">Raw Angle</text>
  <text x="88.0" y="265.0" text-anchor="start" class="card-text">Angle sample</text>
  <text x="88.0" y="285.0" text-anchor="start" class="card-text">Degree-to-radian</text>
  <text x="88.0" y="305.0" text-anchor="start" class="card-text">conversion</text>
  <text x="88.0" y="325.0" text-anchor="start" class="card-text">Periodic meaning preserved</text>
  <text x="88.0" y="357.0" text-anchor="start" class="card-note">Phase stays explicit</text>
  <rect x="334" y="158" width="286" height="248" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M352, 158 H602 Q620, 158 620, 176 V204 H334 V176 Q334, 158 352, 158 Z" fill="url(#card_header)"/>
  <line x1="334" y1="204" x2="620" y2="204" stroke="#7FB2F0" stroke-width="2"/>
  <text x="477.0" y="189" text-anchor="middle" class="card-title">Harmonic Basis</text>
  <rect x="358" y="232.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="477.0" y="247.0" text-anchor="middle" class="flow-row-text">Constant term</text>
  <line x1="477.0" y1="255.0" x2="477.0" y2="260.0" stroke="#4E7AC7" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="358" y="264.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="477.0" y="279.0" text-anchor="middle" class="flow-row-text">Sine channels</text>
  <line x1="477.0" y1="287.0" x2="477.0" y2="292.0" stroke="#4E7AC7" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="358" y="296.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="477.0" y="311.0" text-anchor="middle" class="flow-row-text">Cosine channels</text>
  <line x1="477.0" y1="319.0" x2="477.0" y2="324.0" stroke="#4E7AC7" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="358" y="328.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#7FB2F0" stroke-width="1.2"/>
  <text x="477.0" y="343.0" text-anchor="middle" class="flow-row-text">Truncated at order K</text>
  <text x="477.0" y="384.0" text-anchor="middle" class="card-note">Periodic bias is explicit</text>
  <rect x="680" y="158" width="286" height="248" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M698, 158 H948 Q966, 158 966, 176 V204 H680 V176 Q680, 158 698, 158 Z" fill="url(#card_header)"/>
  <line x1="680" y1="204" x2="966" y2="204" stroke="#ADD5F7" stroke-width="2"/>
  <text x="823.0" y="189" text-anchor="middle" class="card-title">Coefficient Resolver</text>
  <rect x="704" y="248.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="823.0" y="263.0" text-anchor="middle" class="flow-row-text">Static coefficients</text>
  <line x1="823.0" y1="271.0" x2="823.0" y2="276.0" stroke="#4E7AC7" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="704" y="280.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="823.0" y="295.0" text-anchor="middle" class="flow-row-text">Optional linear conditioning</text>
  <line x1="823.0" y1="303.0" x2="823.0" y2="308.0" stroke="#4E7AC7" stroke-width="1.6" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="704" y="312.0" width="238" height="20" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="823.0" y="327.0" text-anchor="middle" class="flow-row-text">Operating-state shift</text>
  <text x="823.0" y="368.0" text-anchor="middle" class="card-note">Interpretable coefficient space</text>
  <rect x="1024" y="186" width="194" height="194" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M1042, 186 H1200 Q1218, 186 1218, 204 V232 H1024 V204 Q1024, 186 1042, 186 Z" fill="url(#card_header)"/>
  <line x1="1024" y1="232" x2="1218" y2="232" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1121" y="217" text-anchor="middle" class="card-title">Prediction</text>
  <text x="1048.0" y="275.0" text-anchor="start" class="card-text">Basis-weight product</text>
  <text x="1048.0" y="295.0" text-anchor="start" class="card-text">Term summation</text>
  <text x="1048.0" y="315.0" text-anchor="start" class="card-text">Scalar TE output</text>
  <text x="1048.0" y="347.0" text-anchor="start" class="card-note">Compact periodic model</text>
  <path d="M292.0,283.0 L307.0,283.0 L307.0,282.0 L322.0,282.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M628.0,282.0 L648.0,282.0 L648.0,282.0 L668.0,282.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M974.0,282.0 L993.0,282.0 L993.0,283.0 L1012.0,283.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="118" y="462" width="1044" height="106" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M136, 462 H1144 Q1162, 462 1162, 480 V508 H118 V480 Q118, 462 136, 462 Z" fill="url(#card_header)"/>
  <line x1="118" y1="508" x2="1162" y2="508" stroke="#ADD5F7" stroke-width="2"/>
  <text x="640" y="493" text-anchor="middle" class="card-title">Interpretation</text>
  <text x="640.0" y="542.0" text-anchor="middle" class="card-text">Each coefficient directly maps to a harmonic contribution, which keeps the model compact and inspectable.</text>
  </g>

</svg>
