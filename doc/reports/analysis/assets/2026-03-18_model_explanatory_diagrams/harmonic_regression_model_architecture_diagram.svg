<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Regression TE Architecture Diagram</title>
  <desc id="desc">Architecture-style computational graph of the harmonic regression transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Harmonic Computational Structure</text>
  <text x="64" y="98" class="canvas-subtitle">Basis generation, coefficient resolution, term-wise multiplication, and final summation</text>
  <rect x="54" y="246" width="176" height="120" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M72, 246 H212 Q230, 246 230, 264 V292 H54 V264 Q54, 246 72, 246 Z" fill="url(#card_header)"/>
  <line x1="54" y1="292" x2="230" y2="292" stroke="#ADD5F7" stroke-width="2"/>
  <text x="142" y="277" text-anchor="middle" class="card-title">Angle Input</text>
  <text x="142" y="333.0" text-anchor="middle" class="card-text">Theta</text>
  <rect x="274" y="132" width="228" height="320" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M292, 132 H484 Q502, 132 502, 150 V178 H274 V150 Q274, 132 292, 132 Z" fill="url(#card_header)"/>
  <line x1="274" y1="178" x2="502" y2="178" stroke="#7FB2F0" stroke-width="2"/>
  <text x="388" y="163" text-anchor="middle" class="card-title">Basis Features</text>
  <text x="388" y="256.0" text-anchor="middle" class="card-text">Constant term</text>
  <text x="388" y="276.0" text-anchor="middle" class="card-text">sin(theta)</text>
  <text x="388" y="296.0" text-anchor="middle" class="card-text">cos(theta)</text>
  <text x="388" y="316.0" text-anchor="middle" class="card-text">sin(2 theta)</text>
  <text x="388" y="336.0" text-anchor="middle" class="card-text">cos(2 theta)</text>
  <text x="388" y="356.0" text-anchor="middle" class="card-text">... up to order K</text>
  <text x="388" y="380.0" text-anchor="middle" class="card-note">Structured periodic basis</text>
  <rect x="548" y="132" width="232" height="320" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M566, 132 H762 Q780, 132 780, 150 V178 H548 V150 Q548, 132 566, 132 Z" fill="url(#card_header)"/>
  <line x1="548" y1="178" x2="780" y2="178" stroke="#ADD5F7" stroke-width="2"/>
  <text x="664" y="163" text-anchor="middle" class="card-title">Coefficient Vector</text>
  <text x="664" y="266.0" text-anchor="middle" class="card-text">c0</text>
  <text x="664" y="286.0" text-anchor="middle" class="card-text">a1 and b1</text>
  <text x="664" y="306.0" text-anchor="middle" class="card-text">a2 and b2</text>
  <text x="664" y="326.0" text-anchor="middle" class="card-text">Higher-order pairs</text>
  <text x="664" y="346.0" text-anchor="middle" class="card-text">Optional conditioned shift</text>
  <text x="664" y="370.0" text-anchor="middle" class="card-note">Static or operating-state conditioned</text>
  <rect x="830" y="246" width="170" height="120" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M848, 246 H982 Q1000, 246 1000, 264 V292 H830 V264 Q830, 246 848, 246 Z" fill="url(#card_header)"/>
  <line x1="830" y1="292" x2="1000" y2="292" stroke="#ADD5F7" stroke-width="2"/>
  <text x="915" y="277" text-anchor="middle" class="card-title">Multiply</text>
  <text x="915" y="333.0" text-anchor="middle" class="card-text">Term-wise product</text>
  <rect x="1050" y="246" width="154" height="120" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M1068, 246 H1186 Q1204, 246 1204, 264 V292 H1050 V264 Q1050, 246 1068, 246 Z" fill="url(#card_header)"/>
  <line x1="1050" y1="292" x2="1204" y2="292" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1127" y="277" text-anchor="middle" class="card-title">Sum</text>
  <text x="1127" y="333.0" text-anchor="middle" class="card-text">Transmission error</text>
  <line x1="230.0" y1="306.0" x2="274.0" y2="306.0" stroke="#4E7AC7" stroke-width="3.5" marker-end="url(#arrow_head)"/>
  <line x1="502.0" y1="306.0" x2="548.0" y2="306.0" stroke="#4E7AC7" stroke-width="3.5" marker-end="url(#arrow_head)"/>
  <line x1="780.0" y1="306.0" x2="830.0" y2="306.0" stroke="#4E7AC7" stroke-width="3.5" marker-end="url(#arrow_head)"/>
  <line x1="1000.0" y1="306.0" x2="1050.0" y2="306.0" stroke="#4E7AC7" stroke-width="3.5" marker-end="url(#arrow_head)"/>
  <rect x="548" y="498" width="290" height="146" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M566, 498 H820 Q838, 498 838, 516 V544 H548 V516 Q548, 498 566, 498 Z" fill="url(#card_header)"/>
  <line x1="548" y1="544" x2="838" y2="544" stroke="#ADD5F7" stroke-width="2"/>
  <text x="693.0" y="529" text-anchor="middle" class="card-title">Conditioning Path</text>
  <rect x="572" y="561.0" width="242" height="28" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="693.0" y="580.0" text-anchor="middle" class="flow-row-text">Speed, torque, temperature, direction</text>
  <line x1="693.0" y1="591.0" x2="693.0" y2="597.0" stroke="#4E7AC7" stroke-width="2.6" marker-end="url(#arrow_head)"/>
  <rect x="572" y="599.0" width="242" height="28" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="693.0" y="618.0" text-anchor="middle" class="flow-row-text">Linear shift in coefficient space</text>
  <line x1="692.0" y1="498.0" x2="692.0" y2="452.0" stroke="#4E7AC7" stroke-width="3.5" marker-end="url(#arrow_head)"/>

</svg>
