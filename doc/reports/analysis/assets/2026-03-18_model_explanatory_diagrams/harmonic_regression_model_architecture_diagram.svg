<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic Regression TE Architecture Diagram</title>
  <desc id="desc">Architecture-style computational graph of the harmonic regression transmission-error model.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="11" markerHeight="11" refX="9.4" refY="5.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Harmonic Computational Structure</text>
  <text x="64" y="98" class="canvas-subtitle">Basis generation, coefficient resolution, term-wise multiplication, and final summation</text>
  <g transform="translate(0,24.0)">
  <rect x="54" y="258" width="180" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M72, 258 H216 Q234, 258 234, 276 V304 H54 V276 Q54, 258 72, 258 Z" fill="url(#card_header)"/>
  <line x1="54" y1="304" x2="234" y2="304" stroke="#ADD5F7" stroke-width="2"/>
  <text x="144" y="289" text-anchor="middle" class="card-title">Angle Input</text>
  <text x="144.0" y="347.0" text-anchor="middle" class="card-text">Theta</text>
  <rect x="274" y="140" width="234" height="328" rx="18" fill="#FFFFFF" stroke="#7FB2F0" stroke-width="3"/>
  <path d="M292, 140 H490 Q508, 140 508, 158 V186 H274 V158 Q274, 140 292, 140 Z" fill="url(#card_header)"/>
  <line x1="274" y1="186" x2="508" y2="186" stroke="#7FB2F0" stroke-width="2"/>
  <text x="391" y="171" text-anchor="middle" class="card-title">Basis Features</text>
  <text x="391.0" y="265.0" text-anchor="middle" class="card-text">Constant term</text>
  <text x="391.0" y="285.0" text-anchor="middle" class="card-text">sin(theta)</text>
  <text x="391.0" y="305.0" text-anchor="middle" class="card-text">cos(theta)</text>
  <text x="391.0" y="325.0" text-anchor="middle" class="card-text">sin(2 theta)</text>
  <text x="391.0" y="345.0" text-anchor="middle" class="card-text">cos(2 theta)</text>
  <text x="391.0" y="365.0" text-anchor="middle" class="card-text">... up to order K</text>
  <text x="391.0" y="397.0" text-anchor="middle" class="card-note">Structured periodic basis</text>
  <rect x="552" y="140" width="234" height="328" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M570, 140 H768 Q786, 140 786, 158 V186 H552 V158 Q552, 140 570, 140 Z" fill="url(#card_header)"/>
  <line x1="552" y1="186" x2="786" y2="186" stroke="#ADD5F7" stroke-width="2"/>
  <text x="669" y="171" text-anchor="middle" class="card-title">Coefficient Vector</text>
  <text x="669.0" y="265.0" text-anchor="middle" class="card-text">c0</text>
  <text x="669.0" y="285.0" text-anchor="middle" class="card-text">a1 and b1</text>
  <text x="669.0" y="305.0" text-anchor="middle" class="card-text">a2 and b2</text>
  <text x="669.0" y="325.0" text-anchor="middle" class="card-text">Higher-order pairs</text>
  <text x="669.0" y="345.0" text-anchor="middle" class="card-text">Optional conditioned shift</text>
  <text x="669.0" y="377.0" text-anchor="middle" class="card-note">Static or operating-state</text>
  <text x="669.0" y="395.0" text-anchor="middle" class="card-note">conditioned</text>
  <rect x="836" y="258" width="168" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M854, 258 H986 Q1004, 258 1004, 276 V304 H836 V276 Q836, 258 854, 258 Z" fill="url(#card_header)"/>
  <line x1="836" y1="304" x2="1004" y2="304" stroke="#ADD5F7" stroke-width="2"/>
  <text x="920" y="289" text-anchor="middle" class="card-title">Multiply</text>
  <text x="920.0" y="337.0" text-anchor="middle" class="card-text">Term-wise</text>
  <text x="920.0" y="357.0" text-anchor="middle" class="card-text">product</text>
  <rect x="1052" y="258" width="156" height="124" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M1070, 258 H1190 Q1208, 258 1208, 276 V304 H1052 V276 Q1052, 258 1070, 258 Z" fill="url(#card_header)"/>
  <line x1="1052" y1="304" x2="1208" y2="304" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1130" y="289" text-anchor="middle" class="card-title">Sum</text>
  <text x="1130.0" y="337.0" text-anchor="middle" class="card-text">Transmission</text>
  <text x="1130.0" y="357.0" text-anchor="middle" class="card-text">error</text>
  <line x1="234.0" y1="320.0" x2="274.0" y2="320.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="508.0" y1="320.0" x2="552.0" y2="320.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="786.0" y1="320.0" x2="836.0" y2="320.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <line x1="1004.0" y1="320.0" x2="1052.0" y2="320.0" stroke="#4E7AC7" stroke-width="3.0" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="548" y="500" width="300" height="144" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M566, 500 H830 Q848, 500 848, 518 V546 H548 V518 Q548, 500 566, 500 Z" fill="url(#card_header)"/>
  <line x1="548" y1="546" x2="848" y2="546" stroke="#ADD5F7" stroke-width="2"/>
  <text x="698.0" y="531" text-anchor="middle" class="card-title">Conditioning Path</text>
  <rect x="572" y="571.0" width="252" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="698.0" y="585.0" text-anchor="middle" class="flow-row-text">Speed, torque, temp, dir</text>
  <line x1="698.0" y1="592.0" x2="698.0" y2="596.0" stroke="#4E7AC7" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <rect x="572" y="601.0" width="252" height="18" rx="12" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="1.2"/>
  <text x="698.0" y="615.0" text-anchor="middle" class="flow-row-text">Linear shift in coefficient space</text>
  <line x1="698.0" y1="500.0" x2="698.0" y2="468.0" stroke="#4E7AC7" stroke-width="2.8" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  </g>

</svg>
