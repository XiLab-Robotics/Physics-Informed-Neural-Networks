<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Residual Harmonic Network TE Architecture Diagram</title>
  <desc id="desc">Architecture-style diagram of the residual harmonic network with structured and residual branches.</desc>
  <defs>
