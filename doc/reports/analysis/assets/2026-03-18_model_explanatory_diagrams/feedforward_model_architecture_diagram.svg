<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Feedforward TE Architecture Diagram</title>
  <desc id="desc">Architecture-style diagram of a feedforward multilayer perceptron for transmission-error prediction.</desc>
  <defs>
    <linearGradient id="canvas_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#35478C"/>
      <stop offset="100%" stop-color="#16193B"/>
    </linearGradient>
    <linearGradient id="card_header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6FAFF"/>
      <stop offset="100%" stop-color="#EEF5FF"/>
    </linearGradient>
    <marker id="arrow_head" markerWidth="8" markerHeight="8" refX="6.8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#4E7AC7"/>
    </marker>
    <style>
      .canvas-title { font: 700 32px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .canvas-subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #dfeaff; }
      .card-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .card-text { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
      .card-note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .tiny { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #4E7AC7; }
      .node-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .node-small-label { font: 700 11px 'Segoe UI', Arial, sans-serif; fill: #16193B; }
      .flow-row-text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #31466E; }
    </style>
  </defs>
  <rect x="0" y="0" width="1280" height="720" rx="28" fill="#FFFFFF"/>
  <rect x="30" y="26" width="1220" height="92" rx="20" fill="url(#canvas_header)"/>
  <text x="64" y="68" class="canvas-title">Feedforward Network Structure</text>
  <text x="64" y="98" class="canvas-subtitle">Dense point-wise network with explicit neuron connectivity</text>
  <g transform="translate(0,57.0)">
  <rect x="56" y="162" width="206" height="394" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M74, 162 H244 Q262, 162 262, 180 V208 H56 V180 Q56, 162 74, 162 Z" fill="url(#card_header)"/>
  <line x1="56" y1="208" x2="262" y2="208" stroke="#ADD5F7" stroke-width="2"/>
  <text x="159" y="193" text-anchor="middle" class="card-title">Inputs</text>
  <text x="159.0" y="318.0" text-anchor="middle" class="card-text">Angle</text>
  <text x="159.0" y="340.0" text-anchor="middle" class="card-text">Speed</text>
  <text x="159.0" y="362.0" text-anchor="middle" class="card-text">Torque</text>
  <text x="159.0" y="384.0" text-anchor="middle" class="card-text">Temperature</text>
  <text x="159.0" y="406.0" text-anchor="middle" class="card-text">Direction</text>
  <text x="159.0" y="438.0" text-anchor="middle" class="card-note">Five normalized scalar</text>
  <text x="159.0" y="456.0" text-anchor="middle" class="card-note">features</text>
  <rect x="1036" y="286" width="160" height="128" rx="18" fill="#FFFFFF" stroke="#ADD5F7" stroke-width="3"/>
  <path d="M1054, 286 H1178 Q1196, 286 1196, 304 V332 H1036 V304 Q1036, 286 1054, 286 Z" fill="url(#card_header)"/>
  <line x1="1036" y1="332" x2="1196" y2="332" stroke="#ADD5F7" stroke-width="2"/>
  <text x="1116" y="317" text-anchor="middle" class="card-title">Output</text>
  <text x="1116.0" y="367.0" text-anchor="middle" class="card-text">Transmission</text>
  <text x="1116.0" y="387.0" text-anchor="middle" class="card-text">error</text>
  <text x="300" y="142" class="label">Example hidden layout: 5 to 4 to 4 to 3 to 1</text>
  <text x="300" y="166" class="tiny">The actual hidden width is configured by the training YAML.</text>
  <circle cx="324" cy="212" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="324" y="216" text-anchor="middle" class="node-label">a</text>
  <circle cx="324" cy="286" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="324" y="290" text-anchor="middle" class="node-label">s</text>
  <circle cx="324" cy="360" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="324" y="364" text-anchor="middle" class="node-label">q</text>
  <circle cx="324" cy="434" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="324" y="438" text-anchor="middle" class="node-label">t</text>
  <circle cx="324" cy="508" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="324" y="512" text-anchor="middle" class="node-label">d</text>
  <circle cx="508" cy="249" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="508" y="253" text-anchor="middle" class="node-label">h1</text>
  <circle cx="508" cy="323" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="508" y="327" text-anchor="middle" class="node-label">h2</text>
  <circle cx="508" cy="397" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="508" y="401" text-anchor="middle" class="node-label">h3</text>
  <circle cx="508" cy="471" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="508" y="475" text-anchor="middle" class="node-label">h4</text>
  <circle cx="692" cy="249" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="692" y="253" text-anchor="middle" class="node-label">h1</text>
  <circle cx="692" cy="323" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="692" y="327" text-anchor="middle" class="node-label">h2</text>
  <circle cx="692" cy="397" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="692" y="401" text-anchor="middle" class="node-label">h3</text>
  <circle cx="692" cy="471" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="692" y="475" text-anchor="middle" class="node-label">h4</text>
  <circle cx="876" cy="286" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="876" y="290" text-anchor="middle" class="node-label">h1</text>
  <circle cx="876" cy="360" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="876" y="364" text-anchor="middle" class="node-label">h2</text>
  <circle cx="876" cy="434" r="17" fill="#F7FBFF" stroke="#ADD5F7" stroke-width="2"/>
  <text x="876" y="438" text-anchor="middle" class="node-label">h3</text>
  <path d="M270.0,359.0 L282.5,359.0 L282.5,360.0 L295.0,360.0" fill="none" stroke="#4E7AC7" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  <path d="M893.0,360.0 L964.0,360.0 L964.0,350.0 L1024.0,350.0" fill="none" stroke="#BFD8FA" stroke-width="2.0" stroke-linejoin="round" stroke-linecap="round" marker-end="url(#arrow_head)"/>
  </g>

</svg>
