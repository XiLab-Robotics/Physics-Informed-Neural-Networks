  <text x="190" y="463" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">Torque</text>
  <text x="190" y="553" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1f2937">Temperature</text>

  <rect x="410" y="150" width="360" height="470" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="440" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">One Neuron</text>
  <circle cx="590" cy="355" r="105" fill="#eff6ff" stroke="#3b82f6" stroke-width="4"/>
  <text x="590" y="340" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">w*x + b</text>
  <text x="590" y="380" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1f2937">Activation</text>
  <rect x="462" y="492" width="256" height="92" rx="18" fill="#ecfccb" stroke="#84cc16" stroke-width="2"/>
  <text x="590" y="530" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#365314">Learns one nonlinear</text>
  <text x="590" y="560" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#365314">response</text>

