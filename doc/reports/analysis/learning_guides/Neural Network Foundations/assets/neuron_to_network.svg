<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f7fafc"/>
  <text x="60" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#183b56">From Inputs To A Neural Network</text>
  <text x="60" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#486581">Single neuron intuition, then dense-layer stacking for richer nonlinear regression.</text>

  <rect x="55" y="150" width="270" height="470" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="85" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Inputs</text>
