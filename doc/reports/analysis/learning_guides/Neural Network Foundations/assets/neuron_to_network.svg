  <text x="880" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">MLP</text>
  <text x="995" y="228" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#486581">Several neurons and layers</text>
  <text x="995" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#486581">build richer features.</text>
