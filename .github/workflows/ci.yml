name: Repository Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install Documentation Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.10,<3.0"
          python -m pip install -r site/requirements-docs.txt

      - name: Check Markdown Structure
        run: |
          python -B scripts/tooling/markdown/markdown_style_check.py --fail-on-warning README.md AGENTS.md doc site

      - name: Run Markdownlint In Chunks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          markdown_path_list = [
              Path("README.md"),
              Path("AGENTS.md"),
              *sorted(path for path in Path("doc").rglob("*.md") if "_build" not in path.parts),
              *sorted(path for path in Path("site").rglob("*.md") if "_build" not in path.parts),
          ]

          unique_markdown_path_list = []
          seen_relative_path_set = set()

          for markdown_path in markdown_path_list:
              relative_markdown_path = markdown_path.as_posix()
              if relative_markdown_path in seen_relative_path_set:
                  continue
              seen_relative_path_set.add(relative_markdown_path)
              unique_markdown_path_list.append(relative_markdown_path)

          chunk_size = 25
          for chunk_start_index in range(0, len(unique_markdown_path_list), chunk_size):
              chunk_path_list = unique_markdown_path_list[chunk_start_index:chunk_start_index + chunk_size]
              markdownlint_command = [
                  "npx",
                  "--yes",
                  "markdownlint-cli2",
                  "--config",
                  ".markdownlint-cli2.jsonc",
                  *chunk_path_list,
              ]
              print("lint chunk:", chunk_path_list[0], "->", chunk_path_list[-1], f"({len(chunk_path_list)} files)")
              subprocess.run(markdownlint_command, check=True)
          PY

      - name: Syntax-Check Repository Scripts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import py_compile

          excluded_parts = {".git", ".temp", ".tools", ".vs", "isolated", "output", "__pycache__", "_build"}

          for script_path in sorted(Path("scripts").rglob("*.py")):
              if any(part in excluded_parts for part in script_path.parts):
                  continue
              py_compile.compile(str(script_path), doraise=True)
              print(script_path.as_posix())
          PY

      - name: Build Sphinx Portal
        run: |
          python -m sphinx -W -b html site site/_build/html
