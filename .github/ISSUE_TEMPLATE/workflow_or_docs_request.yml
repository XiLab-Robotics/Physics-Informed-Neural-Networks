name: Workflow or docs request
description: Request a repository workflow improvement, documentation update, or governance change.
title: "[request] "
labels:
  - docs
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: Describe the requested improvement or missing capability.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why it matters
      description: Explain the practical problem this would solve.
    validations:
      required: true

  - type: textarea
    id: affected_surface
    attributes:
      label: Affected surface
      description: Identify the likely area of the repository.
      placeholder: doc, site, scripts, config, GitHub automation, release process, etc.

  - type: textarea
    id: constraints
    attributes:
      label: Constraints or preferences
      description: Record constraints such as Windows-only paths, public-repo concerns, or deployment expectations.
