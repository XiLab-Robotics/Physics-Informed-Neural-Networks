paths:
  source_dataframe_path: .temp/exact_paper_progress_logging_smoke_sample.csv
  exact_onnx_reference_root: reference/rcim_ml_compensation_recovered_assets/models/exact_onnx_paper_release
  output_root: output/smoke_tests/paper_reimplementation_rcim_exact_model_bank
experiment:
  run_name: rcim_exact_paper_model_bank_smoke_progress_logging
  model_family: paper_reimplementation_rcim_exact_model_bank
  model_type: exact_paper_family_bank
data:
  input_feature_names:
  - rpm
  - deg
  - tor
  maximum_deg: 35.0
  csv_separator: ;
  csv_decimal: ','
training:
  enabled_families:
  - SVR
  test_size: 0.2
  random_seed: 0
  deterministic: true
  threadpool_limit: 1
  hyperparameter_search:
    mode: paper_reference_grid_search
    grid_search_n_jobs: 1
    grid_search_verbose: 2
export:
  enable_onnx_export: false
  target_opset: 12
  export_failure_mode: continue
  enable_empty_svr_constant_surrogate: true
target_scope:
  mode: phases_only
  include_phase_zero: false
  harmonic_order_filter:
  - 162
metadata:
  output_artifact_kind: validation_check
  output_run_name: rcim_exact_paper_model_bank_smoke_progress_logging_progress_logging_smoke
  run_instance_id: 2026-04-15-12-22-08__rcim_exact_paper_model_bank_smoke_progress_logging_progress_logging_smoke
