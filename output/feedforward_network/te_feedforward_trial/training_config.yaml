paths:
  dataset_config_path: config/datasets/transmission_error_dataset.yaml
  output_root: output/feedforward_network
experiment:
  run_name: te_feedforward_trial
  model_family: feedforward
  model_type: feedforward
dataset:
  curve_batch_size: 8
  point_stride: 200
  maximum_points_per_curve: 200
  num_workers: 0
  pin_memory: false
model:
  input_size: 5
  output_size: 1
  hidden_size:
  - 128
  - 128
  - 64
  activation_name: GELU
  dropout_probability: 0.1
  use_layer_norm: true
training:
  learning_rate: 0.001
  weight_decay: 0.0001
  min_epochs: 3
  max_epochs: 12
  patience: 3
  min_delta: 1.0e-05
  log_every_n_steps: 1
  fast_dev_run: false
  deterministic: false
runtime:
  accelerator: auto
  devices: auto
  precision: '32'
  benchmark: true
  use_non_blocking_transfer: false
