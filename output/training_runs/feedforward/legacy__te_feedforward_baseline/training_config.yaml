paths:
  dataset_config_path: config/dataset_processing.yaml
  output_root: output/training_runs/feedforward
experiment:
  run_name: te_feedforward_baseline
  model_type: feedforward
dataset:
  curve_batch_size: 2
  point_stride: 20
  maximum_points_per_curve: null
  num_workers: 4
  pin_memory: true
model:
  input_size: 5
  output_size: 1
  hidden_size:
  - 128
  - 128
  - 64
  activation_name: GELU
  dropout_probability: 0.1
  use_layer_norm: true
training:
  learning_rate: 0.001
  weight_decay: 0.0001
  min_epochs: 10
  max_epochs: 150
  patience: 20
  min_delta: 1.0e-05
  log_every_n_steps: 1
  fast_dev_run: false
  deterministic: false
metadata:
  output_artifact_kind: training_run
  output_run_name: te_feedforward_baseline
  run_instance_id: legacy__te_feedforward_baseline
